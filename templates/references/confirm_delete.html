{% extends "base.html" %}

{% block content %}
  <h1 class="h3 mb-3">{{ title }}</h1>

  <div class="card border-danger">
    <div class="card-body">
      <p class="mb-3">Вы уверены, что хотите удалить: <strong>"{{ object }}"</strong>?</p>

      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button class="btn btn-danger" type="submit">Удалить</button>
          <a class="btn btn-outline-secondary" href="{{ cancel_url }}">Отмена</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
