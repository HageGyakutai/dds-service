{% extends "base.html" %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Подкатегории</h1>
    <a class="btn btn-primary" href="{% url 'references:subcategory_create' %}">Добавить подкатегорию</a>
  </div>

  <div class="list-group">
    {% for subcategory in subcategories %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ subcategory.name }} <span class="text-muted">({{ subcategory.category }})</span></span>
        <div class="d-flex gap-2">
          <a class="btn btn-sm btn-outline-primary" href="{% url 'references:subcategory_update' subcategory.pk %}">Редактировать</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'references:subcategory_delete' subcategory.pk %}">Удалить</a>
        </div>
      </div>
    {% empty %}
      <div class="list-group-item">Подкатегории пока не добавлены.</div>
    {% endfor %}
  </div>
{% endblock %}
