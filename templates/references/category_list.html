{% extends "base.html" %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Категории</h1>
    <a class="btn btn-primary" href="{% url 'references:category_create' %}">Добавить категорию</a>
  </div>

  <div class="list-group">
    {% for category in categories %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ category.name }} <span class="text-muted">({{ category.operation_type }})</span></span>
        <div class="d-flex gap-2">
          <a class="btn btn-sm btn-outline-primary" href="{% url 'references:category_update' category.pk %}">Редактировать</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'references:category_delete' category.pk %}">Удалить</a>
        </div>
      </div>
    {% empty %}
      <div class="list-group-item">Категории пока не добавлены.</div>
    {% endfor %}
  </div>
{% endblock %}
