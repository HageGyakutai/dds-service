{% extends "base.html" %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Статусы</h1>
    <a class="btn btn-primary" href="{% url 'references:status_create' %}">Добавить статус</a>
  </div>

  <div class="list-group">
    {% for status in statuses %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ status.name }}</span>
        <div class="d-flex gap-2">
          <a class="btn btn-sm btn-outline-primary" href="{% url 'references:status_update' status.pk %}">Редактировать</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'references:status_delete' status.pk %}">Удалить</a>
        </div>
      </div>
    {% empty %}
      <div class="list-group-item">Статусы пока не добавлены.</div>
    {% endfor %}
  </div>
{% endblock %}
