{% extends "base.html" %}
{% load i18n %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">{% trans "Statuses" %}</h1>
    <a class="btn btn-primary" href="{% url 'references:status_create' %}">{% trans "Add status" %}</a>
  </div>

  <div class="list-group">
    {% for status in statuses %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ status.name }}</span>
        <div class="d-flex gap-2">
          <a class="btn btn-sm btn-outline-primary" href="{% url 'references:status_update' status.pk %}">{% trans "Edit" %}</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'references:status_delete' status.pk %}">{% trans "Delete" %}</a>
        </div>
      </div>
    {% empty %}
      <div class="list-group-item">{% trans "No statuses added yet." %}</div>
    {% endfor %}
  </div>
{% endblock %}
