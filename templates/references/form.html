{% extends "base.html" %}
{% load i18n %}

{% block content %}
  <h1 class="h3 mb-3">{{ title }}</h1>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">{% trans "Save" %}</button>
          <a class="btn btn-outline-secondary" href="{{ cancel_url }}">{% trans "Cancel" %}</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
