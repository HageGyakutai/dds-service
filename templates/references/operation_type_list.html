{% extends "base.html" %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Типы операций</h1>
    <a class="btn btn-primary" href="{% url 'references:operation_type_create' %}">Добавить тип операции</a>
  </div>

  <div class="list-group">
    {% for operation_type in operation_types %}
      <div class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ operation_type.name }}</span>
        <div class="d-flex gap-2">
          <a class="btn btn-sm btn-outline-primary" href="{% url 'references:operation_type_update' operation_type.pk %}">Редактировать</a>
          <a class="btn btn-sm btn-outline-danger" href="{% url 'references:operation_type_delete' operation_type.pk %}">Удалить</a>
        </div>
      </div>
    {% empty %}
      <div class="list-group-item">Типы операций пока не добавлены.</div>
    {% endfor %}
  </div>
{% endblock %}
