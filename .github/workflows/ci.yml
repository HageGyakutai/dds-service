name: Lint, Types and Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --extra dev --locked

      - name: Run Black
        run: uv run black --check .

      - name: Run Flake8
        run: uv run flake8 .

      - name: Run MyPy
        run: uv run mypy .

      - name: Run Pytest
        run: uv run pytest --maxfail=1 --disable-warnings
