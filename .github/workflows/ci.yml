name: Lint, Types and Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret
      SQL_ENGINE: django.db.backends.postgresql
      POSTGRES_DB: dds_ci
      POSTGRES_USER: dds_user
      POSTGRES_PASSWORD: dds_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      SQL_OPTIONS: ""
      DJANGO_SETTINGS_MODULE: config.settings

      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dds_ci
          POSTGRES_USER: dds_user
          POSTGRES_PASSWORD: dds_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dds_user -d dds_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --extra dev --locked

      - name: Run Black
        run: uv run black --check .

      - name: Run Flake8
        run: uv run flake8 .

      - name: Run MyPy
        run: uv run mypy .

      - name: Apply migrations
        run: uv run python manage.py migrate --noinput

      - name: Create superuser (idempotent)
        run: uv run python manage.py createsuperuser_if_none_exists

      - name: Run Pytest
        run: uv run pytest --maxfail=1 --disable-warnings
